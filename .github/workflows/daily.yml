name: 台股強勢產業日報

on:
  schedule:
    # 台灣時間 14:30 = UTC 06:30，週一到週五
    - cron: '30 6 * * 1-5'

  # 手動觸發（測試用）
  workflow_dispatch:
    inputs:
      send_email:
        description: '寄送 Email？'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      backfill_days:
        description: '回填原始歷史天數（0=不回填，正常執行）'
        required: false
        default: '0'
      replay_days:
        description: '重算族群分數天數（0=不重算）'
        required: false
        default: '0'
      from_db_date:
        description: '從DB重產報告的日期 YYYYMMDD（空=正常抓 API）'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout 程式碼
        uses: actions/checkout@v4

      # ── 還原 SQLite 歷史數據（只還原，不自動存，避免凍結舊版本）──────────
      - name: 💾 還原歷史數據庫
        uses: actions/cache/restore@v4
        with:
          path: db/twstock.db
          # primary key 帶 run_id 永遠不會命中，強制走 restore-keys 抓最近一次
          key: twstock-db-v3-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            twstock-db-v3-${{ runner.os }}-

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 安裝依賴
        run: pip install -r requirements.txt

      # 選擇性回填歷史（手動觸發、backfill_days>0 時先灌歷史資料）
      - name: 🕓 回填歷史資料
        if: ${{ github.event.inputs.backfill_days != '' && github.event.inputs.backfill_days != '0' }}
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python backfill.py ${{ github.event.inputs.backfill_days }}

      # 重算歷史族群分數（純讀 DB、0 次 API，讓族群輪動立即有歷史可比）
      - name: 🔁 重算族群分數
        if: ${{ github.event.inputs.replay_days != '' && github.event.inputs.replay_days != '0' }}
        run: python replay_scores.py ${{ github.event.inputs.replay_days }}

      # 回填與當日分析分開跑，避免同一小時內 FinMind API 呼叫超過 600 次上限
      # from_db_date 有值時改用資料庫重產（0 API），用於回填後立即補正報告
      - name: 📈 執行台股分析
        if: ${{ github.event.inputs.backfill_days == '' || github.event.inputs.backfill_days == '0' }}
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          FINMIND_TOKEN:   ${{ secrets.FINMIND_TOKEN }}
          GMAIL_USER:      ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PWD:   ${{ secrets.GMAIL_APP_PWD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SEND_EMAIL:      ${{ github.event.inputs.send_email || 'true' }}
        run: |
          if [ -n "${{ github.event.inputs.from_db_date }}" ]; then
            python analyzer.py --from-db ${{ github.event.inputs.from_db_date }}
          else
            python analyzer.py
          fi

      # ── 保存 SQLite（每次都存新的一份，讓歷史真正跨天累積）──────────────
      - name: 💾 儲存歷史數據庫
        uses: actions/cache/save@v4
        if: always()
        with:
          path: db/twstock.db
          key: twstock-db-v3-${{ runner.os }}-${{ github.run_id }}

      # ── 上傳報告（success() 確保分析中止時不上傳殘缺報告）─────────────────
      - name: 📄 上傳報告
        uses: actions/upload-artifact@v4
        if: ${{ success() && (github.event.inputs.backfill_days == '' || github.event.inputs.backfill_days == '0') }}
        with:
          name: 台股日報-${{ github.run_id }}
          path: reports/
          retention-days: 90

      # ── 部署到 GitHub Pages（success() → 分析中止或回填 run 都跳過）──────
      - name: 🌐 設定 Pages
        if: ${{ success() && (github.event.inputs.backfill_days == '' || github.event.inputs.backfill_days == '0') }}
        uses: actions/configure-pages@v5

      - name: 📤 上傳 Pages artifact
        if: ${{ success() && (github.event.inputs.backfill_days == '' || github.event.inputs.backfill_days == '0') }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: 🚀 部署到 GitHub Pages
        id: deployment
        if: ${{ success() && (github.event.inputs.backfill_days == '' || github.event.inputs.backfill_days == '0') }}
        uses: actions/deploy-pages@v4
