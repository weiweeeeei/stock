name: 台股強勢產業日報

on:
  schedule:
    # 台灣時間 14:30 = UTC 06:30，週一到週五
    - cron: '30 6 * * 1-5'

  # 手動觸發（測試用）
  workflow_dispatch:
    inputs:
      send_email:
        description: '寄送 Email？'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      backfill_days:
        description: '回填歷史天數（0=不回填，正常執行）'
        required: false
        default: '0'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout 程式碼
        uses: actions/checkout@v4

      # ── 還原 SQLite 歷史數據（只還原，不自動存，避免凍結舊版本）──────────
      - name: 💾 還原歷史數據庫
        uses: actions/cache/restore@v4
        with:
          path: db/twstock.db
          # primary key 帶 run_id 永遠不會命中，強制走 restore-keys 抓最近一次
          key: twstock-db-v3-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            twstock-db-v3-${{ runner.os }}-

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 安裝依賴
        run: pip install -r requirements.txt

      # 選擇性回填歷史（手動觸發、backfill_days>0 時先灌歷史資料）
      - name: 🕓 回填歷史資料
        if: ${{ github.event.inputs.backfill_days != '' && github.event.inputs.backfill_days != '0' }}
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python backfill.py ${{ github.event.inputs.backfill_days }}

      - name: 📈 執行台股分析
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          FINMIND_TOKEN:   ${{ secrets.FINMIND_TOKEN }}
          GMAIL_USER:      ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PWD:   ${{ secrets.GMAIL_APP_PWD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SEND_EMAIL:      ${{ github.event.inputs.send_email || 'true' }}
        run: python analyzer.py

      # ── 保存 SQLite（每次都存新的一份，讓歷史真正跨天累積）──────────────
      - name: 💾 儲存歷史數據庫
        uses: actions/cache/save@v4
        if: always()
        with:
          path: db/twstock.db
          key: twstock-db-v3-${{ runner.os }}-${{ github.run_id }}

      # ── 上傳報告（GitHub Actions Artifacts，可下載）───────────────────────
      - name: 📄 上傳報告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: 台股日報-${{ github.run_id }}
          path: reports/
          retention-days: 90

      # ── 部署到 GitHub Pages ────────────────────────────────────────────
      - name: 🌐 設定 Pages
        uses: actions/configure-pages@v5

      - name: 📤 上傳 Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: 🚀 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
