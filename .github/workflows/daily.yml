name: 台股強勢產業日報

on:
  schedule:
    # 台灣時間 14:30 = UTC 06:30，週一到週五
    - cron: '30 6 * * 1-5'

  # 手動觸發（測試用）
  workflow_dispatch:
    inputs:
      send_email:
        description: '寄送 Email？'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout 程式碼
        uses: actions/checkout@v4

      # ── 還原 SQLite 歷史數據（從上次 cache）──────────────────────────────
      - name: 💾 還原歷史數據庫
        uses: actions/cache@v4
        with:
          path: db/twstock.db
          key: twstock-db-${{ runner.os }}
          restore-keys: |
            twstock-db-

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 安裝依賴
        run: pip install -r requirements.txt

      - name: 📈 執行台股分析
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PWD:     ${{ secrets.GMAIL_APP_PWD }}
          RECIPIENT_EMAIL:   ${{ secrets.RECIPIENT_EMAIL }}
          SEND_EMAIL:        ${{ github.event.inputs.send_email || 'true' }}
        run: python analyzer.py

      # ── 保存 SQLite（讓技術指標歷史累積）─────────────────────────────────
      - name: 💾 儲存歷史數據庫
        uses: actions/cache/save@v4
        if: always()
        with:
          path: db/twstock.db
          key: twstock-db-${{ runner.os }}-${{ github.run_id }}

      # ── 上傳報告（GitHub Actions Artifacts，可下載）───────────────────────
      - name: 📄 上傳報告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: 台股日報-${{ github.run_id }}
          path: reports/
          retention-days: 90
